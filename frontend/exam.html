<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组卷与考试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-body-tertiary">
    <div class="container py-4">
    <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center p-4 rounded-4 hero shadow-sm mb-4">
        <div>
            <h1 class="h3 mb-1">
                <i class="bi bi-ui-checks-grid me-2"></i>组卷与考试
            </h1>
            <p class="mb-0 text-light-emphasis">手动组卷、自动组卷、随机考试自动评分</p>
        </div>
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <a class="btn btn-outline-light" href="./index.html">
                <i class="bi bi-house-door me-1"></i><span>返回首页</span>
            </a>
            <a class="btn btn-light" href="./banks.html">
                <i class="bi bi-folder-check me-1"></i><span>去题库管理</span>
            </a>
            <a id="userArea" class="btn btn-outline-light text-nowrap" href="./login.html">
                <i class="bi bi-person-circle me-1"></i><span id="userAreaText">登录/注册</span>
            </a>
        </div>
    </div>

    <!-- 移动端左侧抽屉背罩，点击关闭 -->
    <div id="examSidebarBackdrop" class="exam-sidebar-backdrop" aria-hidden="true"></div>
    <!-- 移动端左侧固定按钮：打开导航抽屉 -->
    <button id="examSidebarToggle" class="exam-sidebar-toggle-btn d-md-none" type="button" title="打开导航与题库">
        <i class="bi bi-list"></i>
    </button>

    <div class="exam-layout">
        <aside class="exam-sidebar card border-0 shadow-sm" id="examSidebar">
            <div class="exam-sidebar-inner card-body p-3">
                <div class="small text-secondary mb-2">模块导航</div>
                <div class="d-grid gap-2 exam-sidebar-menu">
                    <button class="btn btn-outline-primary text-start module-menu-btn" type="button" data-module="operation">
                        <i class="bi bi-controller me-2"></i>考试操作台
                    </button>
                    <button class="btn btn-outline-primary text-start module-menu-btn" type="button" data-module="papers">
                        <i class="bi bi-journal-text me-2"></i>试卷列表
                    </button>
                    <button class="btn btn-outline-primary text-start module-menu-btn" type="button" data-module="records">
                        <i class="bi bi-clock-history me-2"></i>考试记录
                    </button>
                    <button class="btn btn-outline-primary text-start module-menu-btn" type="button" data-module="stats">
                        <i class="bi bi-graph-up-arrow me-2"></i>考试统计
                    </button>
                </div>
                <hr class="my-3 d-md-none">
                <div class="d-md-none">
                    <label class="form-label mb-1">当前题库</label>
                    <select id="bankSelectMobile" class="form-select"></select>
                    <div id="questionUsageHintMobile" class="mt-2 small text-secondary">--</div>
                </div>
            </div>
        </aside>

        <main class="exam-main">
            <section class="card border-0 shadow-sm mb-3 d-none d-md-block">
                <div class="card-body py-3">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label mb-1">当前题库</label>
                            <select id="bankSelect" class="form-select"></select>
                        </div>
                        <div class="col-md-8">
                            <div id="questionUsageHint" class="mt-2" style="min-width: 200px;">--</div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="moduleTags" class="module-tags mb-3"></section>

            <section id="moduleOperation" class="module-panel">
                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-body">
                        <h2 class="h5 mb-3">
                            <i class="bi bi-magic me-2 text-primary"></i>题库与出题
                        </h2>
                        <div class="mt-3 mb-2" id="questionFiltersRow">
                            <div class="small text-secondary mb-2">筛选（可多选，不选表示不限制）</div>
                            <div class="question-filters-grid">
                                <div class="question-filter-item">
                                    <span class="question-filter-label">难度</span>
                                    <div class="dropdown filter-select-dropdown question-filter-input" id="filterDifficultyWrap" data-bs-auto-close="outside">
                                        <div class="filter-select-trigger d-flex align-items-stretch" data-bs-toggle="dropdown" aria-expanded="false" aria-haspopup="true" title="选择难度">
                                            <div class="filter-select-bar flex-grow-1" id="filterDifficultyBar">
                                                <div class="filter-select-tags" id="filterDifficultyTags"></div>
                                                <span class="filter-select-more d-none" id="filterDifficultyMore"></span>
                                            </div>
                                            <span class="filter-select-toggle"><i class="bi bi-chevron-down"></i></span>
                                        </div>
                                        <ul class="dropdown-menu dropdown-menu-end shadow-sm" id="filterDifficultyMenu" aria-labelledby="filterDifficultyBar">
                                            <li class="px-3 py-2">
                                                <div id="filterDifficulty" class="d-flex flex-column gap-1"></div>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                                <div class="question-filter-item">
                                    <span class="question-filter-label">分类</span>
                                    <div class="dropdown filter-select-dropdown question-filter-input" id="filterCategoryWrap" data-bs-auto-close="outside">
                                        <div class="filter-select-trigger d-flex align-items-stretch" data-bs-toggle="dropdown" aria-expanded="false" aria-haspopup="true" title="选择类型">
                                            <div class="filter-select-bar flex-grow-1" id="filterCategoryBar">
                                                <div class="filter-select-tags" id="filterCategoryTags"></div>
                                                <span class="filter-select-more d-none" id="filterCategoryMore"></span>
                                            </div>
                                            <span class="filter-select-toggle"><i class="bi bi-chevron-down"></i></span>
                                        </div>
                                        <ul class="dropdown-menu dropdown-menu-end shadow-sm" id="filterCategoryMenu" aria-labelledby="filterCategoryBar">
                                            <li class="px-3 py-2">
                                                <div id="filterCategory" class="d-flex flex-column gap-1" style="min-width: 160px;"></div>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                                <div class="question-filter-item">
                                    <span class="question-filter-label">题型</span>
                                    <div class="dropdown filter-select-dropdown question-filter-input" id="filterQuestionTypeWrap" data-bs-auto-close="outside">
                                        <div class="filter-select-trigger d-flex align-items-stretch" data-bs-toggle="dropdown" aria-expanded="false" aria-haspopup="true" title="选择题型">
                                            <div class="filter-select-bar flex-grow-1" id="filterQuestionTypeBar">
                                                <div class="filter-select-tags" id="filterQuestionTypeTags"></div>
                                                <span class="filter-select-more d-none" id="filterQuestionTypeMore"></span>
                                            </div>
                                            <span class="filter-select-toggle"><i class="bi bi-chevron-down"></i></span>
                                        </div>
                                        <ul class="dropdown-menu dropdown-menu-end shadow-sm" id="filterQuestionTypeMenu" aria-labelledby="filterQuestionTypeBar">
                                            <li class="px-3 py-2">
                                                <div id="filterQuestionType" class="d-flex flex-column gap-1" style="min-width: 160px;"></div>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex flex-wrap gap-2 mt-3">
                            <button id="applyQuestionFilter" class="btn btn-outline-secondary" type="button">
                                <i class="bi bi-search me-1"></i><span>查询</span>
                            </button>
                            <button id="genBtn" class="btn btn-primary" type="button">
                                <i class="bi bi-stars me-1"></i><span>按题库生成题目</span>
                            </button>
                            <button id="deleteSelectedBtn" class="btn btn-outline-danger" type="button">
                                <i class="bi bi-trash3 me-1"></i><span>删除</span>
                            </button>
                            <button id="manualPaperBtn" class="btn btn-outline-primary" type="button">
                                <i class="bi bi-pencil-square me-1"></i><span>手动组卷</span>
                            </button>
                            <button id="autoPaperBtn" class="btn btn-outline-primary" type="button">
                                <i class="bi bi-robot me-1"></i><span>自动组卷</span>
                            </button>
                            <button id="startExamBtn" class="btn btn-outline-success" type="button">
                                <i class="bi bi-play-circle me-1"></i><span>自动考试</span>
                            </button>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3 question-page-toolbar">
                            <label class="small text-secondary mb-0">
                                <input id="selectAllQuestions" type="checkbox" class="form-check-input me-1">
                                当前页全选
                            </label>
                            <div class="d-flex align-items-center gap-2">
                                <button id="prevPageBtn" class="btn btn-sm btn-outline-secondary" type="button">上一页</button>
                                <span id="questionPageInfo" class="small text-secondary">第 1 / 1 页</span>
                                <button id="nextPageBtn" class="btn btn-sm btn-outline-secondary" type="button">下一页</button>
                            </div>
                        </div>
                        <div id="questionPool" class="d-grid gap-2 mt-3"></div>
                    </div>
                </div>
            </section>

            <section id="moduleExamSession" class="module-panel d-none">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div></div>
                            <button id="backToOperationBtn" class="btn btn-sm btn-outline-secondary" type="button">返回考试操作台</button>
                        </div>
                        <div id="examSessionMeta" class="small text-secondary mb-3">尚未开始考试</div>
                        <form id="examForm">
                            <div id="examQuestions" class="d-grid gap-2"></div>
                            <button id="submitExamBtn" class="btn btn-success mt-3" type="submit">提交并评分</button>
                        </form>
                        <div id="examResult" class="d-grid gap-2 mt-3"></div>
                    </div>
                </div>
            </section>

            <section id="modulePapers" class="module-panel d-none">
                <div id="paperListSection" class="card border-0 shadow-sm mb-3">
                    <div class="card-body">
                        <h2 class="h5 mb-3">试卷列表</h2>
                        <div id="paperList" class="d-grid gap-2"></div>
                        <div class="d-flex align-items-center justify-content-end gap-2 mt-3">
                            <button id="paperPrevBtn" class="btn btn-sm btn-outline-secondary" type="button">上一页</button>
                            <span id="paperPageInfo" class="small text-secondary">第 1 / 1 页</span>
                            <button id="paperNextBtn" class="btn btn-sm btn-outline-secondary" type="button">下一页</button>
                        </div>
                    </div>
                </div>
                <div id="paperDetailSection" class="card border-0 shadow-sm d-none">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h5 mb-0">试卷详情</h2>
                            <button id="backPaperListBtn" class="btn btn-sm btn-outline-secondary" type="button">返回列表</button>
                        </div>
                        <div id="paperDetailView" class="d-grid gap-2 text-secondary small">请选择一份试卷查看详情</div>
                    </div>
                </div>
            </section>

            <section id="moduleRecords" class="module-panel d-none">
                <div id="recordListSection" class="card border-0 shadow-sm mb-3">
                    <div class="card-body">
                        <h2 class="h5 mb-3">考试结果记录</h2>
                        <div id="examHistoryList" class="d-grid gap-2"></div>
                        <div class="d-flex align-items-center justify-content-end gap-2 mt-3">
                            <button id="recordPrevBtn" class="btn btn-sm btn-outline-secondary" type="button">上一页</button>
                            <span id="recordPageInfo" class="small text-secondary">第 1 / 1 页</span>
                            <button id="recordNextBtn" class="btn btn-sm btn-outline-secondary" type="button">下一页</button>
                        </div>
                    </div>
                </div>
                <div id="recordDetailSection" class="card border-0 shadow-sm d-none">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h5 mb-0">考试记录详情</h2>
                            <button id="backRecordListBtn" class="btn btn-sm btn-outline-secondary" type="button">返回列表</button>
                        </div>
                        <div id="examRecordDetailView" class="d-grid gap-2 text-secondary small">请选择一条考试记录查看详情</div>
                    </div>
                </div>
            </section>

            <section id="moduleStats" class="module-panel d-none">
                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-body">
                        <h2 class="h5 mb-3">考试统计</h2>
                        <div class="row g-3 mb-4 stats-filter-row">
                            <div class="col-12 col-md-4">
                                <label class="form-label">题库</label>
                                <select id="statsBankSelect" class="form-select"></select>
                            </div>
                            <div class="col-12 col-md-4">
                                <label class="form-label">试卷（可选）</label>
                                <select id="statsPaperSelect" class="form-select">
                                    <option value="">全部试卷</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-4 d-flex align-items-end">
                                <button id="statsQueryBtn" class="btn btn-primary stats-query-btn" type="button">查询</button>
                            </div>
                        </div>
                        <div id="statsSummary" class="row g-3 mb-4 small text-secondary stats-summary-row"></div>
                        <div class="row g-3 stats-charts-row">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-body">
                                        <h3 class="h6">每日答题次数</h3>
                                        <div class="stats-chart-wrap">
                                            <canvas id="chartExamCount"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-body">
                                        <h3 class="h6">错题变更趋势</h3>
                                        <div class="stats-chart-wrap">
                                            <canvas id="chartWrongCount"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-body">
                                        <h3 class="h6">分数变更趋势（平均得分）</h3>
                                        <div class="stats-chart-wrap">
                                            <canvas id="chartScore"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="msg" class="alert alert-success mt-3 d-none py-2 mb-0" role="alert"></div>
</div>
<div class="modal fade" id="publicStatsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">公共试卷统计</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="publicStatsContent" class="small text-secondary">加载中...</div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="parsingBlockModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">暂不支持生成题目</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="mb-0 text-secondary">当前题库存在正在解析中的知识文件，请等待解析完成后再进行题目生成。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">确定</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="actionConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="actionConfirmModalTitle">操作确认</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="actionConfirmModalDesc" class="small text-secondary mb-3"></div>
                <div id="actionConfirmModalFields" class="d-grid gap-2"></div>
            </div>
            <div class="modal-footer">
                <button id="actionConfirmModalCancelBtn" type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button id="actionConfirmModalConfirmBtn" type="button" class="btn btn-primary">确认并执行</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="generateQuestionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">按题库生成题目</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">生成数量</label>
                    <input type="number" id="dialogGenCount" class="form-control" min="1" max="50" value="8">
                </div>
                <div class="mb-3">
                    <label class="form-label">题型（可多选）</label>
                    <div id="dialogGenTypesWrap"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="generateQuestionModalConfirm">确认生成</button>
            </div>
        </div>
    </div>
</div>
<button id="genTaskFab" type="button" class="upload-task-fab d-none" aria-label="查看题目生成任务">
    生成
    <span id="genTaskFabCount" class="upload-task-fab-count">0</span>
</button>
<div id="genTaskModalBackdrop" class="upload-task-backdrop d-none">
    <div class="upload-task-modal-card">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h3 class="h6 mb-0">题目生成任务</h3>
            <button id="closeGenTaskModalBtn" type="button" class="btn btn-sm btn-outline-secondary">关闭</button>
        </div>
        <div id="genTaskList" class="d-grid gap-2"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="./api-client.js" defer></script>
<script src="./bind-phone-modal.js" defer></script>
<script src="./plan-config.js" defer></script>
<script src="./exam.js" defer></script>
</body>
</html>
