<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库管理</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-body-tertiary has-mobile-bottom-nav page-tight-mobile">
<div class="web-shell">
    <aside class="web-sidebar">
        <div class="web-sidebar-brand"><img src="./logo.png" alt="小白塔云题库 Logo" class="web-sidebar-logo">小白塔云题库</div>
        <nav class="web-side-nav">
            <a class="web-side-link" href="./index.html"><i class="bi bi-house-door"></i>首页</a>
            <a class="web-side-link active" href="./banks.html"><i class="bi bi-folder-check"></i>题库管理</a>
            <a class="web-side-link" href="./exam.html"><i class="bi bi-ui-checks-grid"></i>组卷考试</a>
            <a class="web-side-link" href="./share.html"><i class="bi bi-share-fill"></i>试卷分享区</a>
        </nav>
    </aside>
    <main class="web-main">
        <header class="web-topbar">
            <div></div>
            <a id="userArea" class="web-topbar-user" href="./login.html">
                <span class="web-topbar-user-avatar"><i class="bi bi-person-fill"></i></span>
                <span id="userAreaText">登录/注册</span>
            </a>
        </header>
        <div class="web-main-body container-fluid py-4">
    <div class="row g-4">
        <section class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
                        <h2 class="h5 mb-0">
                            <i class="bi bi-collection me-2 text-primary"></i>题库列表
                        </h2>
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            <div id="bankUsage" class="usage-progress-wrap" style="min-width: 140px;">当前用量：--</div>
                            <span id="bankCount" class="badge text-bg-light">0 个题库</span>
                        </div>
                    </div>
                    <div id="bankList" class="d-grid gap-3"></div>
                    <div class="d-none d-md-flex align-items-center justify-content-end gap-2 mt-3">
                        <button id="bankPrevBtn" class="btn btn-sm btn-outline-secondary" type="button">上一页</button>
                        <span id="bankPageInfo" class="small text-secondary">第 1 / 1 页</span>
                        <button id="bankNextBtn" class="btn btn-sm btn-outline-secondary" type="button">下一页</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="msg" class="alert alert-success mt-3 d-none py-2 mb-0" role="alert"></div>
        </div>
    </main>
</div>
<nav class="mobile-bottom-nav" aria-label="移动端底部导航">
    <a class="mobile-bottom-nav-link" href="./index.html"><i class="bi bi-house-door"></i><span>首页</span></a>
    <a class="mobile-bottom-nav-link active" href="./banks.html"><i class="bi bi-folder-check"></i><span>题库管理</span></a>
    <a class="mobile-bottom-nav-link" href="./exam.html"><i class="bi bi-ui-checks-grid"></i><span>组卷考试</span></a>
    <a class="mobile-bottom-nav-link" href="./share.html"><i class="bi bi-share-fill"></i><span>分享区</span></a>
    <a class="mobile-bottom-nav-link" href="./center.html"><i class="bi bi-person-circle"></i><span>个人中心</span></a>
</nav>

<div id="addBankModalBackdrop" class="upload-task-backdrop d-none" aria-hidden="true">
    <div class="upload-task-modal-card add-bank-modal-card" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
        <h3 class="h5 mb-3"><i class="bi bi-plus-square-dotted me-2 text-primary"></i>新增题库</h3>
        <form id="createForm">
            <div class="mb-3">
                <input id="createName" class="form-control" placeholder="题库名称" required>
            </div>
            <div class="mb-3">
                <textarea id="createDesc" class="form-control" placeholder="题库描述"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">知识文件（可选，支持批量）</label>
                <input id="createFile" class="form-control" type="file" multiple accept=".txt,.md,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.png,.jpg,.jpeg,.webp,.gif">
                <div class="form-text">可一次选择多个文件，若包含图片将自动使用第一张图作为封面。</div>
            </div>
            <button class="btn btn-primary w-100" type="submit">创建题库</button>
        </form>
    </div>
</div>

<button id="addBankFab" type="button" class="add-bank-fab" aria-label="新增题库" title="新增题库">
    <i class="bi bi-plus-lg add-bank-fab-icon"></i>
</button>

<button id="uploadTaskFab" type="button" class="upload-task-fab d-none" aria-label="查看上传任务">
    上传
    <span id="uploadTaskFabCount" class="upload-task-fab-count">0</span>
</button>

<div id="uploadTaskModalBackdrop" class="upload-task-backdrop d-none">
    <div class="upload-task-modal-card">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h3 class="h6 mb-0">上传任务</h3>
            <button id="closeUploadTaskModalBtn" type="button" class="btn-close" aria-label="Close"></button>
        </div>
        <div id="uploadTaskList" class="d-grid gap-2"></div>
    </div>
</div>

<div id="outlineModalBackdrop" class="upload-task-backdrop d-none" aria-hidden="true">
    <div class="upload-task-modal-card outline-modal-card" role="dialog" aria-modal="true" aria-labelledby="outlineModalTitle" onclick="event.stopPropagation()">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h3 id="outlineModalTitle" class="h6 mb-0"><i class="bi bi-list-nested me-2 text-primary"></i>知识大纲</h3>
            <button id="closeOutlineModalBtn" type="button" class="btn-close outline-modal-close-btn" aria-label="Close"></button>
        </div>
        <div id="outlineDocList" class="outline-doc-list mb-3"></div>
        <div id="outlineMeta" class="small text-secondary mb-2"></div>
        <div id="outlineParseProgressWrap" class="d-none doc-outline-progress">
            <div id="outlineParseProgressText" class="small text-secondary mb-1"></div>
            <div class="progress doc-outline-progress__bar" role="progressbar" aria-label="解析进度">
                <div id="outlineParseProgressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%">0%</div>
            </div>
        </div>
        <div id="outlineContent" class="outline-content-box p-3 bg-light rounded border"></div>
        <div id="outlineNavRow" class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-3">
            <button type="button" id="outlinePrevBtn" class="btn btn-sm btn-outline-primary">上一块</button>
            <span id="outlinePageLabel" class="small text-secondary"></span>
            <button type="button" id="outlineNextBtn" class="btn btn-sm btn-outline-primary">下一块</button>
        </div>
    </div>
</div>

<script src="./api-client.js" defer></script>
<script src="./auth-modal.js" defer></script>
<script src="./mobile-topbar.js" defer></script>
<script src="./bind-phone-modal.js" defer></script>
<script src="./plan-config.js" defer></script>
<script src="./banks.js" defer></script>
</body>
</html>
