<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>小白塔云题库</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-body-tertiary">
<div class="container py-4">
    <div class="p-4 p-md-5 mb-4 rounded-4 hero shadow-sm position-relative">
        <div class="d-flex flex-wrap justify-content-between align-items-center w-100 gap-2">
            <div class="flex-grow-1">
                <h1 class="display-6 fw-bold mb-2">
                    <i class="bi bi-mortarboard-fill me-2"></i>小白塔云题库
                </h1>
            </div>
            <div class="user-area-top-right">
                <a id="userArea" class="btn btn-outline-light btn-sm text-nowrap" href="./login.html">
                    <i class="bi bi-person-circle me-1"></i><span id="userAreaText">登录/注册</span>
                </a>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <a class="card h-100 border-0 shadow-sm entry-card text-decoration-none text-dark" href="./banks.html">
                <div class="card-body p-4">
                    <h5 class="card-title mb-2">
                        <i class="bi bi-folder-check me-2 text-primary"></i>题库管理
                    </h5>
                    <p class="card-text text-secondary mb-0">题库列表、新增、编辑、删除，并支持新增/编辑时上传知识文件。</p>
                </div>
            </a>
        </div>
        <div class="col-md-6">
            <a class="card h-100 border-0 shadow-sm entry-card text-decoration-none text-dark" href="./exam.html">
                <div class="card-body p-4">
                    <h5 class="card-title mb-2">
                        <i class="bi bi-ui-checks-grid me-2 text-success"></i>组卷与考试
                    </h5>
                    <p class="card-text text-secondary mb-0">支持手动组卷、自动组卷、随机考试、自动评分与解析。</p>
                </div>
            </a>
        </div>
    </div>

    <section class="mt-5">
        <h2 class="h5 mb-3">
            <i class="bi bi-share-fill me-2 text-primary"></i>试卷分享区
        </h2>
        <p class="text-secondary small mb-3">浏览他人分享的试卷，订阅到自己的题库，并可评分与评价。</p>
        <div id="publicPapersRow" class="row g-3">
            <div class="col-12 text-secondary small">加载中...</div>
        </div>
        <div class="mt-3">
            <a class="btn btn-outline-primary btn-sm" href="./share.html">
                <i class="bi bi-arrow-right-circle me-1"></i>进入试卷分享区
            </a>
        </div>
    </section>
</div>
<script src="./api-client.js" defer></script>
<script src="./bind-phone-modal.js" defer></script>
<script src="./index.js" defer></script>
</body>
</html>
