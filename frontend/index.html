<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>小白塔云题库</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles.css">

<body class="bg-body-tertiary has-mobile-bottom-nav">
<div class="web-shell">
    <aside class="web-sidebar">
        <div class="web-sidebar-brand"><i class="bi bi-mortarboard-fill"></i>小白塔云题库</div>
        <nav class="web-side-nav">
            <a class="web-side-link active" href="./index.html"><i class="bi bi-house-door"></i>首页</a>

            <a class="web-side-link" href="./exam.html"><i class="bi bi-ui-checks-grid"></i>组卷考试</a>

        </nav>

    <main class="web-main">
        <header class="web-topbar">
            <div></div>
            <a id="userArea" class="web-topbar-user" href="./login.html">

                <span id="userAreaText">登录/注册</span>
            </a>
        </header>
        <div class="web-main-body container-fluid py-4">
            <section class="home-ad-banner card border-0 shadow-sm mb-3">
                <div class="card-body p-4 p-md-5">
                    <div class="home-ad-banner__layout">
                        <div>
                            <div class="home-ad-banner__badge">推广</div>

                        </div>
                        <div class="home-ad-banner__visual" aria-hidden="true">
                            <div class="home-ad-banner__visual-play">
                                <i class="bi bi-play-fill"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section class="home-ad-banner__actions mb-4">
                <a class="btn btn-outline-primary home-entry-btn" href="./banks.html">

                </a>
                <a class="btn btn-primary home-entry-btn" href="./exam.html">
                    <i class="bi bi-stars me-1"></i>生成题目
                </a>
            </section>

            <section class="mb-2">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h5 mb-0">最新分享试卷</h2>
                    <a class="small text-decoration-none" href="./share.html">查看全部</a>

                <div id="publicPapersRow" class="row g-3"></div>
            </section>
        </div>

    <a class="mobile-bottom-nav-link active" href="./index.html"><i class="bi bi-house-door"></i><span>首页</span></a>
