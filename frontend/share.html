<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷分享区</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-body-tertiary has-mobile-bottom-nav">
<div class="web-shell">
    <aside class="web-sidebar">
        <div class="web-sidebar-brand"><i class="bi bi-mortarboard-fill"></i>小白塔云题库</div>
        <nav class="web-side-nav">
            <a class="web-side-link" href="./index.html"><i class="bi bi-house-door"></i>首页</a>
            <a class="web-side-link" href="./banks.html"><i class="bi bi-folder-check"></i>题库管理</a>
            <a class="web-side-link" href="./exam.html"><i class="bi bi-ui-checks-grid"></i>组卷考试</a>
            <a class="web-side-link active" href="./share.html"><i class="bi bi-share-fill"></i>试卷分享区</a>
        </nav>
    </aside>
    <main class="web-main">
        <header class="web-topbar">
            <div></div>
            <a id="userArea" class="web-topbar-user" href="./login.html?redirect=share.html">
                <span class="web-topbar-user-avatar"><i class="bi bi-person-fill"></i></span>
                <span id="userAreaText">登录/注册</span>
            </a>
        </header>
        <div class="web-main-body container-fluid py-4">

    <div id="listSection">
        <h2 class="h5 mb-3">已分享的试卷</h2>
        <div id="publicList" class="row g-3"></div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <span id="listPageInfo" class="small text-secondary"></span>
            <div class="gap-2 d-flex">
                <button id="listPrevBtn" class="btn btn-sm btn-outline-secondary" type="button">上一页</button>
                <button id="listNextBtn" class="btn btn-sm btn-outline-secondary" type="button">下一页</button>
            </div>
        </div>
    </div>

    <div id="detailSection" class="d-none">
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body">
                <h2 id="detailTitle" class="h5 mb-2"></h2>
                <div id="detailMeta" class="small text-secondary mb-3"></div>
                <div id="detailQuestions" class="d-grid gap-2"></div>
            </div>
        </div>
        <div class="card border-0 shadow-sm mb-3" id="subscribeCard">
            <div class="card-body">
                <h3 class="h6 mb-2">订阅到我的题库</h3>
                <p id="subscribeHint" class="small text-secondary mb-2">登录后可将该试卷订阅到您指定的题库。</p>
                <div id="subscribeForm" class="d-none d-flex gap-2 align-items-end flex-wrap">
                    <div>
                        <label class="form-label small mb-0">选择题库</label>
                        <select id="subscribeBankSelect" class="form-select form-select-sm" style="width:auto;min-width:180px"></select>
                    </div>
                    <button id="subscribeBtn" class="btn btn-primary btn-sm" type="button">确认订阅</button>
                </div>
            </div>
        </div>
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body">
                <h3 class="h6 mb-2">评分与评价</h3>
                <p id="reviewHint" class="small text-secondary mb-2">登录后可对该试卷评分（1-5 星）并填写评价。</p>
                <div id="reviewForm" class="d-none mb-3">
                    <div class="mb-2">
                        <label class="form-label small">评分</label>
                        <select id="reviewRating" class="form-select form-select-sm" style="width:auto">
                            <option value="5">5 星</option>
                            <option value="4">4 星</option>
                            <option value="3">3 星</option>
                            <option value="2">2 星</option>
                            <option value="1">1 星</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">评价（选填）</label>
                        <textarea id="reviewComment" class="form-control form-control-sm" rows="2" placeholder="写下您的评价"></textarea>
                    </div>
                    <button id="reviewSubmitBtn" class="btn btn-primary btn-sm" type="button">提交</button>
                </div>
                <div id="reviewsList" class="small"></div>
            </div>
        </div>
    </div>
        </div>
    </main>
</div>
<nav class="mobile-bottom-nav" aria-label="移动端底部导航">
    <a class="mobile-bottom-nav-link" href="./index.html"><i class="bi bi-house-door"></i><span>首页</span></a>
    <a class="mobile-bottom-nav-link" href="./banks.html"><i class="bi bi-folder-check"></i><span>题库管理</span></a>
    <a class="mobile-bottom-nav-link" href="./exam.html"><i class="bi bi-ui-checks-grid"></i><span>组卷考试</span></a>
    <a class="mobile-bottom-nav-link active" href="./share.html"><i class="bi bi-share-fill"></i><span>分享区</span></a>
    <a class="mobile-bottom-nav-link" href="./center.html"><i class="bi bi-person-circle"></i><span>个人中心</span></a>
</nav>
<script src="./api-client.js" defer></script>
<script src="./bind-phone-modal.js" defer></script>
<script src="./share.js" defer></script>
</body>
</html>
