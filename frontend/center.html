<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 小白塔云题库</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-body-tertiary has-mobile-bottom-nav page-tight-mobile page-center">
<div class="web-shell">
    <aside class="web-sidebar">
        <div class="web-sidebar-brand"><img src="./logo.png" alt="小白塔云题库 Logo" class="web-sidebar-logo">小白塔云题库</div>
        <nav class="web-side-nav">
            <a class="web-side-link" href="./index.html"><i class="bi bi-house-door"></i>首页</a>
            <a class="web-side-link" href="./banks.html"><i class="bi bi-folder-check"></i>题库管理</a>
            <a class="web-side-link" href="./exam.html"><i class="bi bi-ui-checks-grid"></i>组卷考试</a>
            <a class="web-side-link" href="./share.html"><i class="bi bi-share-fill"></i>试卷分享区</a>
        </nav>
    </aside>
    <main class="web-main">
        <header class="web-topbar">
            <div></div>
            <a class="web-topbar-user" href="./center.html">
                <span class="web-topbar-user-avatar"><i class="bi bi-person-fill"></i></span>
                <span>个人中心</span>
            </a>
        </header>
        <div class="web-main-body container-fluid py-4">
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h2 class="h5 mb-3">
                        <i class="bi bi-person-badge me-2 text-primary"></i>账号信息
                    </h2>
                    <div id="userInfo" class="small text-secondary">加载中...</div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h2 class="h5 mb-3">
                        <i class="bi bi-gem me-2 text-primary"></i>当前版本与权益
                    </h2>
                    <div id="planInfo" class="small text-secondary">加载中...</div>
                    <div id="usageInfo" class="mt-3 pt-3 border-top small text-secondary d-none">
                        <div id="trialCountdown" class="alert alert-warning py-2 px-3 small d-none mb-3">
                            试用版剩余 30 天。
                        </div>
                        <div class="mb-3">
                            <strong class="d-block mb-1">知识文件用量</strong>
                            <div id="usageStorage" style="min-width: 160px;"></div>
                        </div>
                        <div class="mb-3">
                            <strong class="d-block mb-1">题库用量</strong>
                            <div id="usageBanks" style="min-width: 160px;"></div>
                        </div>
                        <div>
                            <strong class="d-block mb-1">白塔币余额</strong>
                            <div id="usageCoins" style="min-width: 160px;"></div>
                            <div id="coinBuyRow" class="mt-2 d-flex flex-wrap gap-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12">
            <div class="card border-0 shadow-sm plan-section-card">
                <div class="card-body">
                    <h2 class="h5 mb-3">
                        <i class="bi bi-currency-yen me-2 text-primary"></i>选择版本与续费周期
                    </h2>
                    <p class="text-secondary small mb-4">选择续费周期可享优惠，升级后立即生效。</p>
                    <div class="plan-period-tabs mb-4" role="tablist">
                        <button type="button" class="plan-period-tab active" data-period="monthly" aria-selected="true">月付</button>
                        <button type="button" class="plan-period-tab" data-period="quarterly">季付 <span class="badge-save">省15%</span></button>
                        <button type="button" class="plan-period-tab" data-period="yearly">年付 <span class="badge-save">省35%</span></button>
                    </div>
                    <div id="planCardsRow" class="row g-4 plan-cards-row"></div>
                </div>
            </div>
        </div>
        <div class="col-12">
            <div class="d-flex justify-content-end align-items-center">
                <button id="logoutBtn" class="btn btn-outline-danger" type="button">
                    <i class="bi bi-box-arrow-right me-1"></i><span>退出登录</span>
                </button>
            </div>
        </div>
    </div>
        </div>
    </main>
</div>
<nav class="mobile-bottom-nav" aria-label="移动端底部导航">
    <a class="mobile-bottom-nav-link" href="./index.html"><i class="bi bi-house-door"></i><span>首页</span></a>
    <a class="mobile-bottom-nav-link" href="./banks.html"><i class="bi bi-folder-check"></i><span>题库管理</span></a>
    <a class="mobile-bottom-nav-link" href="./exam.html"><i class="bi bi-ui-checks-grid"></i><span>组卷考试</span></a>
    <a class="mobile-bottom-nav-link" href="./share.html"><i class="bi bi-share-fill"></i><span>分享区</span></a>
    <a class="mobile-bottom-nav-link active" href="./center.html"><i class="bi bi-person-circle"></i><span>个人中心</span></a>
</nav>

<!-- 加群咨询弹窗 -->
<div id="paymentModalBackdrop" class="payment-modal-backdrop d-none">
    <div class="payment-modal-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="h5 mb-0">加群咨询升级</h3>
            <button type="button" id="paymentModalClose" class="btn-close" aria-label="Close"></button>
        </div>
        <div id="paymentModalPlan" class="small text-secondary mb-3"></div>
        <div class="mb-3 small text-secondary">
            扫码添加客服微信或加入学习群，咨询版本与付费事宜。
        </div>
        <div class="text-center">
            <img id="groupQrImage" src="./group.jpg" alt="加群二维码" style="max-width: 220px; height: auto; display: inline-block; border-radius: 8px;">
            <div id="paymentModalTip" class="small text-secondary mt-3 d-none"></div>
        </div>
    </div>
</div>

<script src="./api-client.js" defer></script>
<script src="./auth-modal.js" defer></script>
<script src="./mobile-topbar.js" defer></script>
<script src="./bind-phone-modal.js" defer></script>
<script src="./plan-config.js" defer></script>
<script src="./center.js" defer></script>
</body>
</html>
